<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoadSafetyInsights - Naxos PoC</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h1>RoadSafety<span>Insights</span></h1>
            <p>Naxos Live Simulation</p>
        </div>

        <div class="tabs">
            <button id="btn-tab-live" class="tab-btn active">Live Tracking</button>
            <button id="btn-tab-stats" class="tab-btn">Στατιστικά</button>
        </div>

        <div id="tab-live" class="tab-content active-tab">
            
            <div class="status-panel">
                <div id="system-status" class="status-indicator safe"></div>
                <span id="status-text">Ενεργό - Σε παρακολούθηση</span>
            </div>

            <div class="route-display">
                <strong>Διαδρομή:</strong> 
                <span id="route-name">Επιλέξτε διαδρομή...</span>
            </div>

            <div class="controls">
                <label>Αφετηρία:</label>
                <select id="start-point">
                    <option value="Chora">Χώρα (Λιμάνι)</option>
                    <option value="AgiosProkopios">Άγιος Προκόπιος</option>
                    <option value="Plaka">Πλάκα</option>
                    <option value="Halki">Χαλκί</option>
                    <option value="Filoti">Φιλώτι</option>
                    <option value="Apiranthos">Απείρανθος</option>
                    <option value="Moutsouna">Μουτσούνα</option>
                    <option value="Koronos">Κόρωνος</option>
                    <option value="Apollonas">Απόλλωνας</option>
                </select>

                <label>Προορισμός:</label>
                <select id="end-point">
                    <option value="Chora">Χώρα (Λιμάνι)</option>
                    <option value="AgiosProkopios">Άγιος Προκόπιος</option>
                    <option value="Plaka">Πλάκα</option>
                    <option value="Halki" selected>Χαλκί</option>
                    <option value="Filoti">Φιλώτι</option>
                    <option value="Apiranthos">Απείρανθος</option>
                    <option value="Moutsouna">Μουτσούνα</option>
                    <option value="Koronos">Κόρωνος</option>
                    <option value="Apollonas">Απόλλωνας</option>
                </select>

                <button id="start-btn" class="btn btn-primary">Εκκίνηση Διαδρομής</button>
                <button id="pause-btn" class="btn btn-warning hidden">Παύση Προσομοίωσης</button>
                <button id="reset-btn" class="btn btn-secondary">Επαναφορά</button>
            </div>
            
            <a href="landing.html" class="portal-link">← Επιστροφή στην Αρχική</a>
        </div>

        <div id="tab-stats" class="tab-content hidden">
            <h3>Δεδομένα Διαδρομών</h3>
            <p>Τα ιστορικά στατιστικά φορτώνονται...</p>
        </div>
    </div>

    <div class="map-container">
        <div id="real-map"></div>

        <div id="alert-popup" class="hidden popup-glass">
            <h2>⚠️ ΠΡΟΕΙΔΟΠΟΙΗΣΗ</h2>
            <div class="popup-data">
                <p><strong>Κίνδυνος:</strong> <span id="popup-hazard-name"></span></p>
                <p><strong>Καιρός:</strong> <span id="popup-weather"></span></p>
                <p><strong>Ιστορικό Ατυχημάτων:</strong> <span id="popup-total"></span></p>
                <p><strong>Πρόσφατα:</strong> <span id="popup-recent"></span></p>
            </div>
            <button id="btn-understand" class="btn btn-acknowledge">Κατανόηση</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
